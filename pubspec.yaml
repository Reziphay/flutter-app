# pubspec.yaml
# Reziphay
#
# Author: Vugar Safarzada (@vugarsafarzada)

name: reziphay
description: "Reziphay - Book smarter, live better"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # HTTP client
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Icons
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8

  # Location
  geolocator: ^13.0.2

  # Network images
  cached_network_image: ^3.4.1

  # Image / photo picker + cropper
  image_picker: ^1.1.2
  image_cropper: ^11.0.0

  # Persistent key-value storage (settings)
  shared_preferences: ^2.3.2

  # URL / phone launcher
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/
