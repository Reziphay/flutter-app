# pubspec.yaml
# Reziphay
#
# Author: Vugar Safarzada (@vugarsafarzada)

name: reziphay
description: "Reziphay - Book smarter, live better"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # HTTP client
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Icons
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8

  # Location
  geolocator: ^13.0.2

  # Network images
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
